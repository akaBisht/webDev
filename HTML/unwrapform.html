<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeHelp Contact Us!</title>
</head>
<body>

    <h1>Welcome To CodeHelp!</h1>
    <h2>Contact Us Form</h2>

    <form action="">
        <label for="name">Name:</label>
        <input type="text" name="name" id="name" placeholder="Enter Your Name">
        <br>
        <br>
        <label for="email">Email:</label>
        <input type="email" name="email" id="email" placeholder="Enter Your Email">
        <br>
        <br>
        <label for="email">Contact:</label>
        <input type="number" name="contact" id="contact">
        <br>
        <br>
        <label for="gender">Gender:</label>
        <select name="gender" id="gender">
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="nottosay">Not To Say</option>
        </select>
        <br>
        <br>
        <label for="dob">Date Of Birth</label>
        <input type="date" name="date" id="dob">
        <br>
        <br>
        <span>Rating:</span>
        <input type="radio" name="rating" id="rating1" value="1">
        <label for="rating1">1</label>
        <input type="radio" name="rating" id="rating2" value="2">
        <label for="rating2">2</label>
        <input type="radio" name="rating" id="rating3" value="3">
        <label for="rating3">3</label>
        <input type="radio" name="rating" id="rating4" value="4">
        <label for="rating4">4</label>
        <input type="radio" name="rating" id="rating5" value="5">
        <label for="rating5">5</label>
        <br>
        <br>
        <label for="msg">Enter Your Message</label>
        <br>
        <textarea name="message" id="msg" cols="30" rows="5" placeholder="Write  Your Message!"></textarea>
        <br>
        <input type="submit" name="submit" id="submit" value="Submit">
        <input type="reset" name="reset" id="reset" value="Reset">
    </form>
    <br>
    <footer>
        <a href="http://www.youtube.com" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png?20220706172052" alt="YouTube"
            height="40px"
            width="50px">
        </a>
        <a href="http://www.instagram.com" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/95/Instagram_logo_2022.svg/1024px-Instagram_logo_2022.svg.png" alt="Instagram"
            height="40px"
            width="50px">
        </a>
        <a href="http://www.telegram.com" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Telegram_logo.svg/2048px-Telegram_logo.svg.png" alt="Telegram"
            height="40px"
            width="50px">
        </a>
    </footer>
</body>
</html>
